# uses Trivy image scanner for CVEs - Docker Image
name: Image Scanner

on: 
    workflow_dispatch:
      # This workflow can be triggered manually from the GitHub Actions tab in the repository.
      # This allows us to run the image scan on demand, such as after a new image is pushed to Docker Hub or before a release.

jobs:
    image-scanner:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            
            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha}}
                severity: 'CRITICAL,HIGH'
                exit-code: '1'
                