name: DevsecOps Pipeline

on:
  workflow_dispatch:

jobs: 
    code-quality:
        uses: ./.github/workflows/code-quality.yml
    
    secret-scan:
        uses: ./.github/workflows/secret-scan.yml
    
    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-build-push:
        needs: [image-scan]
        uses: ./.github/workflows/docker-build-push.yml

    image-scan:
        uses: ./.github/workflows/image-scan.yml

    deploy-to-server:
        needs: [code-quality, secret-scan, dependency-scan, docker-build-push, image-scan]
        uses: ./.github/workflows/deploy-to-server.yml
    
    

    